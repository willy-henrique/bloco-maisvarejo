
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>Mavo Gestão</title>
    <link rel="icon" type="image/png" href="/mavo-logo.png" />
    <link rel="apple-touch-icon" href="/mavo-logo.png" />

    <!-- Preconnect para fontes e Firebase (reduz latência inicial) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firebaseapp.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />

    <!-- Fontes: não bloqueia o render -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" /></noscript>

    <style>
      #app-boot-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #020617; z-index: 9999; gap: 16px;
        transition: opacity .2s ease;
      }
      #app-boot-loader.hide { opacity: 0; pointer-events: none; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100">

    <!-- Spinner FORA do #root — React não apaga ele ao renderizar null -->
    <div id="app-boot-loader">
      <img src="/mavo-logo.png" alt="Mavo" style="width:48px;height:48px;border-radius:10px;opacity:0.9;" />
      <div style="width:32px;height:32px;border:3px solid #1e3a5f;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;"></div>
    </div>

    <div id="root"></div>

    <script>
      // Remove o spinner assim que o React inserir qualquer conteúdo no #root
      (function () {
        var loader = document.getElementById('app-boot-loader');
        var root   = document.getElementById('root');
        if (!loader || !root) return;
        var ob = new MutationObserver(function () {
          if (root.childElementCount > 0) {
            loader.classList.add('hide');
            setTimeout(function () { loader.remove(); }, 250);
            ob.disconnect();
          }
        });
        ob.observe(root, { childList: true });
      })();
    </script>

    <script type="module" src="/index.tsx"></script>
  </body>
</html>
